<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Stunt Cycle</title>
<style>
  html, body {
    margin: 0; height: 100%; background: #000; color: #fff;
    font-family: "Courier New", monospace;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    -webkit-user-select: none; user-select: none;
  }
  #stage { position: relative; width: 800px; max-width: 100vw; }
  canvas { display: block; width: 100%; height: auto; border: 1px solid #333; background: #000; touch-action: none; }
  #hint { margin-top: 12px; font-size: 12px; color: #888; letter-spacing: 1px; text-align: center; }
  #back { color: #0ff; text-decoration: none; }
  #touch { display: none; gap: 10px; margin-top: 14px; }
  #touch button {
    width: 150px; height: 60px; border-radius: 12px; background: #111; color: #0ff;
    border: 1px solid #0ff; font-size: 18px; letter-spacing: 2px; touch-action: none;
  }
  #touch button:active { background: #033; }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game" width="800" height="600"></canvas>
  </div>
  <div id="hint">HOLD &#8593; or SPACE TO REV &bull; RELEASE TO JUMP &bull; CLEAR THE BUSES, REACH THE RAMP, DON'T OVERSHOOT &bull; P PAUSE &bull; M MUTE &bull; <a id="back" href="#">&#9664; ARCADE</a></div>
  <div id="touch">
    <button id="btnRev">HOLD&nbsp;TO&nbsp;REV</button>
  </div>

<script>
// ---- Access gate (only when hosted; local files skip it) ----
const ACCESS_KEY = "arcade-3f9k2x7q";
const _params = new URLSearchParams(location.search);
const _key = _params.get("key") || "";
const _hosted = location.protocol.indexOf("http") === 0 &&
                location.hostname !== "localhost" && location.hostname !== "127.0.0.1";
if (_hosted && _key !== ACCESS_KEY) {
  document.body.innerHTML =
    '<div style="color:#0ff;font-family:monospace;text-align:center;padding-top:28vh;font-size:18px;line-height:1.6;">' +
    '&#128274; This game is private.<br><br>You need the full link (with its access key) to play.</div>';
  throw new Error("Stunt Cycle: access key required");
}
document.getElementById("back").href = ".." + (_key ? "/index.html?key=" + encodeURIComponent(_key) : "/index.html");

// =====================================================================
//  STUNT CYCLE  —  wireframe bus jump, faithful to Atari's 1976 game:
//  twist the throttle to set speed (no steering, no air control), clear
//  the buses, and land on the ramp. Too slow = into the buses; too fast
//  = overshoot off the end.
// =====================================================================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;
const rand = (a, b) => Math.random() * (b - a) + a;

// --- Sound ---
let actx = null, master = null, muted = false;
function initAudio() {
  if (!actx) { actx = new (window.AudioContext || window.webkitAudioContext)();
    master = actx.createGain(); master.gain.value = muted ? 0 : 1; master.connect(actx.destination); }
  if (actx.state === "suspended") actx.resume();
}
function toggleMute() { muted = !muted; if (master) master.gain.value = muted ? 0 : 1; }
function tone(freq, dur, type = "square", vol = 0.15, delay = 0) {
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq; o.connect(g); g.connect(master);
  const t = actx.currentTime + delay;
  g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur);
}
function noise(dur = 0.3, vol = 0.4, cut = 900) {
  if (!actx) return;
  const n = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(1, n, actx.sampleRate); const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  const s = actx.createBufferSource(); s.buffer = buf;
  const f = actx.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = cut;
  const g = actx.createGain(); g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  s.connect(f); f.connect(g); g.connect(master); s.start();
}
let engine = null;
function startEngine() {
  if (!actx || engine) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = "sawtooth"; o.frequency.value = 60; g.gain.value = 0.06;
  o.connect(g); g.connect(master); o.start(); engine = { o };
}
function setEngine(power) { if (engine) engine.o.frequency.value = 60 + power * 2.6; }
function stopEngine() { if (engine) { engine.o.stop(); engine.o.disconnect(); engine = null; } }
function sndJump() { stopEngine(); tone(280, 0.25, "sawtooth", 0.18); noise(0.2, 0.18, 1500); }
function sndCrash() { stopEngine(); noise(0.6, 0.5, 700); tone(90, 0.5, "square", 0.15); }
function sndClear() { tone(523, 0.1, "square", 0.18); tone(784, 0.16, "square", 0.18, 0.1); }

// --- Geometry (side view) ---
const GY = 470;
const RAMP_X0 = 150, LIP_X = 240, LIP_Y = GY - 55;   // takeoff ramp
const TH = Math.atan2(55, LIP_X - RAMP_X0);          // ramp angle
const BUS_X0 = 262, BUS_W = 26, BUS_H = 34, BUS_TOP = GY - BUS_H;
const LAND_LEN = 120, LAND_RISE = 55;
const START_X = 50, WHEEL_R = 9;
const G = 0.34;
const MIN_S = 4, MAX_S = 15;       // launch speed range (power 0..100)
const POWER_RATE = 0.7;            // power fill per frame (slower = more control)

function rampProfile(x) {           // ground height on the takeoff side
  if (x <= RAMP_X0) return GY;
  if (x < LIP_X) return GY - (x - RAMP_X0) / (LIP_X - RAMP_X0) * 55;
  return LIP_Y;
}
function landY(x) {                 // landing-ramp height past the buses
  const L0 = game.landStart, L1 = game.landEnd;
  if (x <= L0) return GY - LAND_RISE;
  if (x < L1) return (GY - LAND_RISE) + (x - L0) / (L1 - L0) * LAND_RISE;
  return GY;
}

const game = {
  state: "menu",            // menu | playing | paused | over
  phase: "rev",             // rev | run | air
  lives: 3, score: 0, numBuses: 2,
  hi: parseInt(localStorage.getItem("stuntCycleHigh") || "0", 10),
  power: 0,
  bike: { x: START_X, y: GY - WHEEL_R, vx: 0, vy: 0, angle: 0, speed: 0 },
  debris: [], crashTimer: 0, clearTimer: 0,
  busEnd: 0, landStart: 0, landEnd: 0, frame: 0,
};

function computeLayout() {
  game.busEnd = BUS_X0 + game.numBuses * BUS_W;
  game.landStart = game.busEnd + 6;
  game.landEnd = game.landStart + LAND_LEN;
}
function resetBike() {
  game.phase = "rev"; game.power = 0;
  game.bike = { x: START_X, y: GY - WHEEL_R, vx: 0, vy: 0, angle: 0, speed: 0 };
}
function startGame() {
  game.state = "playing";
  game.lives = 3; game.score = 0; game.numBuses = 2;
  game.debris = []; game.crashTimer = 0; game.clearTimer = 0;
  computeLayout(); resetBike();
}
function launch() {
  if (game.phase !== "rev") return;
  game.bike.speed = MIN_S + game.power / 100 * (MAX_S - MIN_S);
  game.phase = "run"; sndJump();
}
function releaseThrottle() {
  if (game.state === "playing" && game.phase === "rev" && game.power > 3) launch();
}
function spawnDebris(x, y) {
  for (let i = 0; i < 18; i++) {
    const d = rand(0, Math.PI * 2), s = rand(1, 5);
    game.debris.push({ x, y, vx: Math.cos(d) * s, vy: Math.sin(d) * s - 2, life: rand(25, 50), maxLife: 50 });
  }
}
function crash() {
  spawnDebris(game.bike.x, game.bike.y); sndCrash();
  game.lives--; game.crashTimer = 70; game.phase = "done";
  if (game.lives <= 0 && game.score > game.hi) {
    game.hi = game.score; localStorage.setItem("stuntCycleHigh", String(game.hi));
  }
}
function cleared() {
  game.score += game.numBuses; game.numBuses++; sndClear();
  game.clearTimer = 50; game.phase = "done"; computeLayout();
}

// --- Input (throttle + brake only — no steering, true to the original) ---
const keys = {};
document.addEventListener("keydown", e => {
  initAudio();
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code)) e.preventDefault();
  keys[e.code] = true;
  if (e.code === "Enter" && (game.state === "menu" || game.state === "over")) startGame();
  if (e.code === "Space" && !e.repeat && game.state === "playing") releaseThrottle();
  if (e.code === "KeyP" || e.code === "Escape") togglePause();
  if (e.code === "KeyM") toggleMute();
});
document.addEventListener("keyup", e => {
  keys[e.code] = false;
  if (e.code === "ArrowUp") releaseThrottle();
});
function togglePause() {
  if (game.state === "playing") { game.state = "paused"; stopEngine(); }
  else if (game.state === "paused") game.state = "playing";
}

// =====================================================================
//  UPDATE
// =====================================================================
function update() {
  game.frame++;
  for (const p of game.debris) { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--; }
  game.debris = game.debris.filter(p => p.life > 0);

  if (game.state !== "playing") { stopEngine(); return; }
  const b = game.bike;

  if (game.crashTimer > 0) {
    if (--game.crashTimer === 0) { if (game.lives > 0) resetBike(); else game.state = "over"; }
    return;
  }
  if (game.clearTimer > 0) { if (--game.clearTimer === 0) resetBike(); return; }

  if (game.phase === "rev") {
    startEngine();
    if (keys["ArrowUp"] || keys["Space"]) game.power = Math.min(100, game.power + POWER_RATE);
    setEngine(game.power);
    b.angle = -game.power / 100 * 0.5;     // throttle wheelie, just for show
  }
  else if (game.phase === "run") {
    b.x += b.speed;
    b.y = rampProfile(b.x) - WHEEL_R;
    b.angle = -TH;
    if (b.x >= LIP_X) {
      b.vx = Math.cos(TH) * b.speed; b.vy = -Math.sin(TH) * b.speed;
      game.phase = "air";
    }
  }
  else if (game.phase === "air") {
    b.x += b.vx; b.y += b.vy; b.vy += G;
    b.angle = Math.atan2(b.vy, b.vx);       // nose follows the arc (no control)
    const bottom = b.y + WHEEL_R;

    if (b.x >= BUS_X0 && b.x <= game.busEnd && bottom >= BUS_TOP) { crash(); return; } // into a bus
    if (b.x < BUS_X0 && bottom >= GY) { crash(); return; }                              // fell short
    if (b.x > game.busEnd && bottom >= landY(b.x)) {                                    // touchdown past buses
      if (b.x <= game.landEnd) cleared(); else crash();                                 // on ramp = safe, beyond = overshoot
      return;
    }
    if (b.x > W + 40) crash();               // flew off the end
  }
}

// =====================================================================
//  DRAW
// =====================================================================
function roundRectPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function drawBus(bx) {
  const bw = BUS_W - 5;                       // small gap between buses
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5;
  // body with rounded corners
  roundRectPath(bx, BUS_TOP, bw, BUS_H - 5, 6); ctx.stroke();
  // window strip
  roundRectPath(bx + 3, BUS_TOP + 4, bw - 6, 9, 2); ctx.stroke();
  ctx.beginPath();                            // window dividers
  ctx.moveTo(bx + bw * 0.5, BUS_TOP + 4); ctx.lineTo(bx + bw * 0.5, BUS_TOP + 13);
  ctx.stroke();
  // wheels
  ctx.beginPath(); ctx.arc(bx + 6, GY - 4, 3, 0, Math.PI * 2);
  ctx.moveTo(bx + bw - 3, GY - 4); ctx.arc(bx + bw - 6, GY - 4, 3, 0, Math.PI * 2);
  ctx.stroke();
}
function drawBike(x, y, angle) {
  ctx.save();
  ctx.translate(x, y); ctx.rotate(angle);
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(-12, 0, WHEEL_R, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath(); ctx.arc(12, 0, WHEEL_R, 0, Math.PI * 2); ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(-12, 0); ctx.lineTo(0, -7); ctx.lineTo(12, 0);
  ctx.moveTo(0, -7); ctx.lineTo(6, -12); ctx.stroke();
  ctx.strokeStyle = "#0ff";                   // rider
  ctx.beginPath();
  ctx.moveTo(-2, -7); ctx.lineTo(-4, -18); ctx.lineTo(8, -14);
  ctx.moveTo(-4, -18); ctx.arc(-4, -21, 3, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}
function centerText(t, size, y, color = "#fff") {
  ctx.fillStyle = color; ctx.font = size + "px 'Courier New', monospace";
  ctx.textAlign = "center"; ctx.fillText(t, W / 2, y);
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // Runway + takeoff ramp
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(0, GY); ctx.lineTo(RAMP_X0, GY); ctx.lineTo(LIP_X, LIP_Y); ctx.stroke();

  if (game.state !== "menu") {
    for (let i = 0; i < game.numBuses; i++) drawBus(BUS_X0 + i * BUS_W);

    // Landing ramp (elevated near the buses, sloping down to the ground)
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(game.landStart, GY - LAND_RISE); ctx.lineTo(game.landEnd, GY); ctx.lineTo(W, GY); ctx.stroke();

    for (const p of game.debris) {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = "#fa0"; ctx.fillRect(p.x - 1.5, p.y - 1.5, 3, 3);
    }
    ctx.globalAlpha = 1;

    if (game.phase !== "done") drawBike(game.bike.x, game.bike.y, game.bike.angle);

    ctx.fillStyle = "#fff"; ctx.font = "20px 'Courier New', monospace"; ctx.textAlign = "left";
    ctx.fillText("SCORE " + game.score, 20, 30);
    ctx.fillText("LIVES " + game.lives, 20, 55);
    ctx.textAlign = "right";
    ctx.fillText("BUSES " + game.numBuses, W - 20, 30);
    ctx.fillText("HI " + game.hi, W - 20, 55);

    if (game.phase === "rev") {
      ctx.strokeStyle = "#0ff"; ctx.lineWidth = 2; ctx.strokeRect(20, H - 40, 220, 18);
      ctx.fillStyle = "#0ff"; ctx.fillRect(22, H - 38, 216 * game.power / 100, 14);
      ctx.font = "13px 'Courier New', monospace"; ctx.textAlign = "left";
      ctx.fillText("THROTTLE", 20, H - 48);
    }
    if (game.clearTimer > 0) centerText("CLEARED!", 36, 150, "#0ff");
    if (game.crashTimer > 0) centerText("CRASH!", 36, 150, "#f44");
  }

  if (game.state === "menu") {
    centerText("STUNT CYCLE", 46, H / 2 - 30, "#0ff");
    centerText("PRESS ENTER TO START", 18, H / 2 + 14);
    centerText("HIGH SCORE  " + game.hi, 15, H / 2 + 44, "#0ff");
  }
  if (game.state === "paused") centerText("PAUSED  (P)", 30, H / 2);
  if (game.state === "over") {
    centerText("GAME OVER", 46, H / 2 - 20, "#f44");
    centerText("SCORE " + game.score + "   HI " + game.hi, 18, H / 2 + 18);
    centerText("PRESS ENTER TO PLAY AGAIN", 15, H / 2 + 46);
  }
}

// --- Touch: a single REV button (hold to throttle, release to jump) ---
function bindRev(id) {
  const el = document.getElementById(id);
  const down = e => { e.preventDefault(); initAudio();
    if (game.state === "menu" || game.state === "over") { startGame(); return; }
    keys["ArrowUp"] = true; };
  const up = e => { e.preventDefault(); keys["ArrowUp"] = false; releaseThrottle(); };
  el.addEventListener("touchstart", down, { passive: false });
  el.addEventListener("touchend", up, { passive: false });
  el.addEventListener("mousedown", down); el.addEventListener("mouseup", up); el.addEventListener("mouseleave", up);
}
bindRev("btnRev");
canvas.addEventListener("touchstart", e => { e.preventDefault(); initAudio();
  if (game.state === "menu" || game.state === "over") startGame(); }, { passive: false });
if ("ontouchstart" in window || navigator.maxTouchPoints > 0) document.getElementById("touch").style.display = "flex";

function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
