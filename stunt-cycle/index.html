<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive">
<title>Stunt Cycle</title>
<style>
  html, body {
    margin: 0; height: 100%; background: #000; color: #fff;
    font-family: "Courier New", monospace;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    -webkit-user-select: none; user-select: none;
  }
  /* Fit the 4:3 canvas within BOTH the width and height, so it works in portrait
     AND landscape (and re-fits automatically when the phone is rotated mid-game). */
  #stage { position: relative; width: min(100vw, calc(80vh * 4 / 3)); max-width: 800px; }
  canvas { display: block; width: 100%; height: auto; border: 1px solid #333; background: #000; touch-action: none; }
  #hint { margin-top: 12px; font-size: 12px; color: #888; letter-spacing: 1px; text-align: center; }
  #back { color: #fb0; text-decoration: none; }
  #back:hover { text-decoration: underline; }
  #touch { display: none; gap: 10px; margin-top: 14px; }
  #touch button {
    width: 64px; height: 58px; border-radius: 12px; background: #111; color: #0ff;
    border: 1px solid #0ff; font-size: 18px; touch-action: none;
  }
  #touch button:active { background: #033; }
  /* Landscape phones (short height): shrink the controls so they fit below the canvas. */
  @media (max-height: 500px) {
    #hint { font-size: 9px; margin-top: 5px; letter-spacing: 0; }
    #touch { margin-top: 6px; gap: 8px; }
    #touch button { width: 56px; height: 44px; font-size: 16px; }
  }
  #lbentry {
    position: absolute; left: 50%; top: 58%; transform: translateX(-50%);
    display: none; flex-direction: column; align-items: center; gap: 8px;
  }
  #lbentry .lbl { color: #ff0; font-size: 14px; letter-spacing: 1px; }
  #initials {
    width: 120px; text-align: center; font-family: inherit; font-size: 28px;
    letter-spacing: 10px; text-indent: 10px; text-transform: uppercase;
    background: #001; color: #0ff; border: 1px solid #0ff; border-radius: 6px; padding: 6px 0;
  }
  #saveBtn {
    background: #111; color: #0ff; border: 1px solid #0ff; border-radius: 8px;
    padding: 8px 16px; font-family: inherit; font-size: 14px; letter-spacing: 1px; cursor: pointer;
  }
  #saveBtn:hover { background: #033; }
  #pauseMenu {
    position: absolute; inset: 0; display: none;
    flex-direction: column; align-items: center; justify-content: center; gap: 12px;
    background: rgba(0,0,0,0.82);
  }
  #pauseMenu .ptitle { font-size: 40px; letter-spacing: 4px; color: #0ff; }
  .pbtn {
    background: #111; color: #0ff; border: 1px solid #0ff; border-radius: 8px;
    padding: 9px 18px; font-family: inherit; font-size: 15px; letter-spacing: 1px; cursor: pointer; min-width: 150px;
  }
  .pbtn:hover { background: #033; }
  .pbtn.arcade { color: #fb0; border-color: #fb0; }
  .pbtn.arcade:hover { background: #221800; }
  #overButtons {
    position: absolute; left: 50%; top: 60%; transform: translateX(-50%);
    display: none; gap: 10px;
  }
  #menu {
    position: absolute; inset: 0; display: flex;
    flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    background: #000;
  }
  #menu .ptitle { font-size: 40px; letter-spacing: 4px; color: #0ff; }
  #startBtn { font-size: 18px; padding: 11px 26px; }
  .board { width: 300px; max-width: 84%; font-size: 15px; color: #0ff; }
  .board .bt { color: #888; letter-spacing: 2px; font-size: 12px; text-align: center; margin-bottom: 4px; }
  .board .br { display: flex; justify-content: space-between; padding: 1px 8px; }
  .board .br.dim { color: #555; }
</style>
</head>
<body>
  <div id="stage">
    <canvas id="game" width="800" height="600"></canvas>
    <div id="menu">
      <div class="ptitle">STUNT CYCLE</div>
      <div id="menuBoard" class="board"></div>
      <button class="pbtn" id="startBtn">START &#9654;</button>
    </div>
    <div id="lbentry">
      <div class="lbl">NEW HIGH SCORE! ENTER INITIALS</div>
      <input id="initials" maxlength="3" autocomplete="off" spellcheck="false" placeholder="AAA">
      <button id="saveBtn">SAVE</button>
    </div>
    <div id="pauseMenu">
      <div class="ptitle">PAUSED</div>
      <button class="pbtn" id="pResume">RESUME</button>
      <button class="pbtn" id="pMenu">MENU</button>
      <button class="pbtn arcade" id="pArcade">&#9664; ARCADE</button>
    </div>
    <div id="overButtons">
      <button class="pbtn" id="oAgain">PLAY AGAIN</button>
      <button class="pbtn" id="oMenu">MENU</button>
      <button class="pbtn arcade" id="oArcade">&#9664; ARCADE</button>
    </div>
  </div>
  <div id="hint">TOP LANE: &#8593; FASTER / &#8595; SLOWER &bull; TUBES DOWN TO THE JUMP &bull; IN AIR: &#8592; &#8594; ANGLE (land rear wheel first on the ramp) &bull; P PAUSE &bull; M MUTE &bull; <a id="back" href="#">&#9664; ARCADE</a></div>
  <div id="touch">
    <button id="btnUp">&#8593;</button>
    <button id="btnDown">&#8595;</button>
    <button id="btnLeft">&#8634;</button>
    <button id="btnRight">&#8635;</button>
  </div>

<script>
// ---- Access gate (only when hosted; local files skip it) ----
const ACCESS_KEY = "arcade-3f9k2x7q";
const _params = new URLSearchParams(location.search);
const _key = _params.get("key") || "";
const _hosted = location.protocol.indexOf("http") === 0 &&
                location.hostname !== "localhost" && location.hostname !== "127.0.0.1";
if (_hosted && _key !== ACCESS_KEY) {
  document.body.innerHTML =
    '<div style="color:#0ff;font-family:monospace;text-align:center;padding-top:28vh;font-size:18px;line-height:1.6;">' +
    '&#128274; This game is private.<br><br>You need the full link (with its access key) to play.</div>';
  throw new Error("Stunt Cycle: access key required");
}
document.getElementById("back").href = ".." + (_key ? "/index.html?key=" + encodeURIComponent(_key) : "/index.html");

// ---- Shared leaderboard (same Cloudflare D1 backend as Asteroids) ----
const LEADERBOARD_API = "https://arcade-api.dave-zoellner-us.workers.dev";
const GAME_ID = "stunt-cycle", BOARD = "main";
const REMOTE_BOARD = LEADERBOARD_API.length > 0;
function loadLocalScores() {
  try { return JSON.parse(localStorage.getItem("stuntCycleScores")) || []; }
  catch (e) { return []; }
}
function saveLocalScores() { localStorage.setItem("stuntCycleScores", JSON.stringify(game.scores)); }
function qualifies(score) {
  if (score <= 0) return false;
  if (game.scores.length < 5) return true;
  return score > game.scores[game.scores.length - 1].score;
}
function addScoreLocal(initials, score) {
  game.scores.push({ initials, score });
  game.scores.sort((a, b) => b.score - a.score);
  game.scores = game.scores.slice(0, 5);
  saveLocalScores();
}
async function fetchBoard() {
  if (!REMOTE_BOARD) return;
  try {
    const r = await fetch(LEADERBOARD_API + "/scores?key=" + encodeURIComponent(ACCESS_KEY) +
                          "&game=" + GAME_ID + "&config=" + BOARD);
    if (!r.ok) return;
    const d = await r.json();
    if (Array.isArray(d)) { game.scores = d; saveLocalScores(); renderMenuBoard(); }
  } catch (e) { /* offline — keep local */ }
}
async function postScore(initials, score) {
  if (!REMOTE_BOARD) return false;
  try {
    const r = await fetch(LEADERBOARD_API + "/scores?key=" + encodeURIComponent(ACCESS_KEY), {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ game: GAME_ID, config: BOARD, initials, score }),
    });
    return r.ok;
  } catch (e) { return false; }
}

const lbEntry = document.getElementById("lbentry");
const initialsEl = document.getElementById("initials");
function showEntry() { lbEntry.style.display = "flex"; initialsEl.value = ""; setTimeout(() => initialsEl.focus(), 50); }
function hideEntry() { lbEntry.style.display = "none"; }
async function submitInitials() {
  let v = (initialsEl.value || "").toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 3) || "AAA";
  addScoreLocal(v, game.score);
  hideEntry();
  showOverButtons();
  if (await postScore(v, game.score)) await fetchBoard();
}
initialsEl.addEventListener("input", () => { initialsEl.value = initialsEl.value.toUpperCase().replace(/[^A-Z0-9]/g, "").slice(0, 3); });
initialsEl.addEventListener("keydown", e => { e.stopPropagation(); if (e.code === "Enter") { e.preventDefault(); submitInitials(); } });
document.getElementById("saveBtn").onclick = submitInitials;
// On game over: show the latest shared board, and offer initials if you made it.
function onGameOver() {
  game.state = "over";
  hideOverButtons();
  (async () => {
    await fetchBoard();
    if (qualifies(game.score)) showEntry();   // initials first; buttons appear after SAVE
    else showOverButtons();
  })();
}

// =====================================================================
//  STUNT CYCLE  —  top run-up lane (set speed) → tube → jump lane →
//  clear the buses → land rear-wheel-first on the ramp.
// =====================================================================
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");
const W = canvas.width, H = canvas.height;
const rand = (a, b) => Math.random() * (b - a) + a;

// --- Sound ---
let actx = null, master = null, muted = false;
function initAudio() {
  if (!actx) { actx = new (window.AudioContext || window.webkitAudioContext)();
    master = actx.createGain(); master.gain.value = muted ? 0 : 1; master.connect(actx.destination); }
  if (actx.state === "suspended") actx.resume();
}
function toggleMute() { muted = !muted; if (master) master.gain.value = muted ? 0 : 1; }
function tone(freq, dur, type = "square", vol = 0.15, delay = 0) {
  if (!actx) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = type; o.frequency.value = freq; o.connect(g); g.connect(master);
  const t = actx.currentTime + delay;
  g.gain.setValueAtTime(vol, t); g.gain.exponentialRampToValueAtTime(0.0001, t + dur);
  o.start(t); o.stop(t + dur);
}
function noise(dur = 0.3, vol = 0.4, cut = 900) {
  if (!actx) return;
  const n = Math.floor(actx.sampleRate * dur);
  const buf = actx.createBuffer(1, n, actx.sampleRate); const d = buf.getChannelData(0);
  for (let i = 0; i < n; i++) d[i] = Math.random() * 2 - 1;
  const s = actx.createBufferSource(); s.buffer = buf;
  const f = actx.createBiquadFilter(); f.type = "lowpass"; f.frequency.value = cut;
  const g = actx.createGain(); g.gain.setValueAtTime(vol, actx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, actx.currentTime + dur);
  s.connect(f); f.connect(g); g.connect(master); s.start();
}
let engine = null;
function startEngine() {
  if (!actx || engine) return;
  const o = actx.createOscillator(), g = actx.createGain();
  o.type = "sawtooth"; o.frequency.value = 60; g.gain.value = 0.05;
  o.connect(g); g.connect(master); o.start(); engine = { o };
}
function setEngine(speed) { if (engine) engine.o.frequency.value = 60 + speed * 14; }
function stopEngine() { if (engine) { engine.o.stop(); engine.o.disconnect(); engine = null; } }
function sndJump() { tone(280, 0.22, "sawtooth", 0.16); noise(0.18, 0.16, 1500); }
function sndCrash() { stopEngine(); noise(0.6, 0.5, 700); tone(90, 0.5, "square", 0.15); }
function sndClear() { tone(523, 0.1, "square", 0.18); tone(784, 0.16, "square", 0.18, 0.1); }

// --- Geometry ---
const GY = 470;                                   // bottom ground / jump (ramp) lane
// Two stacked run-up lanes feed the jump lane, zig-zagging via tubes:
//   A (top)  L->R  --tube down (right)-->  B (middle) R->L  --tube down (left)-->  ramp lane L->R
const A_Y = 90, B_Y = 210;                         // top + middle run-up lanes
const LANE_LEFT = 60, LANE_RIGHT = 740;
const TUBE_R = LANE_RIGHT, TUBE_L = LANE_LEFT;     // right tube A->B, left tube B->ramp
const RAMP_X0 = 150, LIP_X = 240, LIP_Y = GY - 55; // takeoff ramp
const TH = Math.atan2(55, LIP_X - RAMP_X0);        // takeoff angle
const BUS_X0 = 262, BUS_W = 26, BUS_H = 34, BUS_TOP = GY - BUS_H;
const LAND_LEN = 160, LAND_RISE = 35;               // landing ramp: top slope + vertical front face
const PHI = Math.atan2(LAND_RISE, LAND_LEN);        // landing-ramp slope
const LEANBACK = 0.60 * (Math.PI / 2);             // allowed rear-first lean (60% of vertical)
const FRONT_EPS = 0.10;                            // tiny tolerance for a both-wheels landing
const WHEEL_R = 9, AX = 12;                         // wheel radius, half wheelbase
const G = 0.34;
const MIN_S = 1.5, MAX_S = 30;   // throttle capacity doubled (same fill rate) — two run-up lanes
const ACCEL = 0.18, BRAKE = 0.22, ROT = 0.045;

function rampProfile(x) {
  if (x <= RAMP_X0) return GY;
  if (x < LIP_X) return GY - (x - RAMP_X0) / (LIP_X - RAMP_X0) * 55;
  return LIP_Y;
}
const game = {
  state: "menu",            // menu | playing | paused | over
  phase: "approachA",       // approachA | tubeAB | approachB | tubeBC | run | air | done
  lives: 3, score: 0, numBuses: 2,
  scores: loadLocalScores(),
  bike: { x: LANE_LEFT, y: A_Y - WHEEL_R, vx: 0, vy: 0, angle: 0, speed: 4, face: 1 },
  debris: [], crashTimer: 0, clearTimer: 0,
  busEnd: 0, landStart: 0, landEnd: 0, frame: 0,
};

function computeLayout() {
  game.busEnd = BUS_X0 + game.numBuses * BUS_W;
  game.landStart = game.busEnd + 6;
  game.landEnd = game.landStart + LAND_LEN;
}
function resetBike() {
  game.phase = "approachA";
  game.bike = { x: LANE_LEFT, y: A_Y - WHEEL_R, vx: 0, vy: 0, angle: 0, speed: 4, face: 1 };
}
const menuEl = document.getElementById("menu");
function renderMenuBoard() {
  let html = '<div class="bt">TOP 5 SCORES</div>';
  for (let i = 0; i < 5; i++) {
    const e = game.scores[i];
    if (e) html += '<div class="br"><span>' + (i+1) + '. ' + e.initials + '</span><span>' + e.score + '</span></div>';
    else   html += '<div class="br dim"><span>' + (i+1) + '. ---</span><span>0</span></div>';
  }
  document.getElementById("menuBoard").innerHTML = html;
}
function startGame() {
  menuEl.style.display = "none"; hideEntry(); hideOverButtons();
  game.state = "playing";
  game.lives = 3; game.score = 0; game.numBuses = 2;
  game.debris = []; game.crashTimer = 0; game.clearTimer = 0;
  computeLayout(); resetBike();
}
function spawnDebris(x, y) {
  for (let i = 0; i < 18; i++) {
    const d = rand(0, Math.PI * 2), s = rand(1, 5);
    game.debris.push({ x, y, vx: Math.cos(d) * s, vy: Math.sin(d) * s - 2, life: rand(25, 50), maxLife: 50 });
  }
}
function crash() {
  spawnDebris(game.bike.x, game.bike.y); sndCrash();
  game.lives--; game.crashTimer = 70; game.phase = "done";
}
function cleared() {
  game.score += game.numBuses; game.numBuses++; sndClear();
  game.clearTimer = 50; game.phase = "done"; computeLayout();
}

// --- Input ---
const keys = {};
document.addEventListener("keydown", e => {
  if (e.target && e.target.tagName === "INPUT") return;  // typing initials
  initAudio();
  if (["ArrowUp","ArrowDown","ArrowLeft","ArrowRight","Space"].includes(e.code)) e.preventDefault();
  keys[e.code] = true;
  if (e.code === "Enter" && (game.state === "menu" || game.state === "over")) startGame();
  if (e.code === "KeyP" || e.code === "Escape") togglePause();
  if (e.code === "KeyM") toggleMute();
});
document.addEventListener("keyup", e => { keys[e.code] = false; });
// Standard pause menu: RESUME, MENU (this game's title), ARCADE.
const pauseEl = document.getElementById("pauseMenu");
function togglePause() {
  if (game.state === "playing") { game.state = "paused"; stopEngine(); pauseEl.style.display = "flex"; }
  else if (game.state === "paused") resumeGame();
}
function resumeGame() { if (game.state !== "paused") return; game.state = "playing"; pauseEl.style.display = "none"; }
function goToTitle() { game.state = "menu"; stopEngine(); pauseEl.style.display = "none"; hideEntry(); hideOverButtons(); menuEl.style.display = "flex"; renderMenuBoard(); }
const ARCADE_HREF = document.getElementById("back").href;
document.getElementById("pResume").onclick = resumeGame;
document.getElementById("pMenu").onclick = goToTitle;
document.getElementById("pArcade").onclick = () => { location.href = ARCADE_HREF; };

// Standard game-over menu: PLAY AGAIN, MENU (this game's title), ARCADE.
const overBtns = document.getElementById("overButtons");
function showOverButtons() { overBtns.style.display = "flex"; }
function hideOverButtons() { overBtns.style.display = "none"; }
document.getElementById("oAgain").onclick = startGame;
document.getElementById("oMenu").onclick = goToTitle;
document.getElementById("oArcade").onclick = () => { location.href = ARCADE_HREF; };
document.getElementById("startBtn").onclick = startGame;

// =====================================================================
//  UPDATE
// =====================================================================
function update() {
  game.frame++;
  for (const p of game.debris) { p.x += p.vx; p.y += p.vy; p.vy += 0.15; p.life--; }
  game.debris = game.debris.filter(p => p.life > 0);

  if (game.state !== "playing") { stopEngine(); return; }
  const b = game.bike;

  if (game.crashTimer > 0) {
    if (--game.crashTimer === 0) { if (game.lives > 0) resetBike(); else onGameOver(); }
    return;
  }
  if (game.clearTimer > 0) { if (--game.clearTimer === 0) resetBike(); return; }

  // Lane A (top): drive L->R, building throttle.
  if (game.phase === "approachA") {
    startEngine();
    if (keys["ArrowUp"]) b.speed += ACCEL;
    if (keys["ArrowDown"]) b.speed -= BRAKE;
    b.speed = Math.max(MIN_S, Math.min(MAX_S, b.speed));
    setEngine(b.speed);
    b.x += b.speed;
    b.y = A_Y - WHEEL_R; b.angle = 0; b.face = 1;
    if (b.x >= LANE_RIGHT) { b.x = TUBE_R; game.phase = "tubeAB"; }
  }
  // Right tube A->B.
  else if (game.phase === "tubeAB") {
    setEngine(b.speed);
    b.face = 1; b.angle = Math.PI / 2; b.x = TUBE_R;
    b.y += Math.max(4, b.speed);
    if (b.y >= B_Y - WHEEL_R) { b.y = B_Y - WHEEL_R; b.angle = 0; game.phase = "approachB"; }
  }
  // Lane B (middle): drive R->L, still building throttle.
  else if (game.phase === "approachB") {
    startEngine();
    if (keys["ArrowUp"]) b.speed += ACCEL;
    if (keys["ArrowDown"]) b.speed -= BRAKE;
    b.speed = Math.max(MIN_S, Math.min(MAX_S, b.speed));
    setEngine(b.speed);
    b.x -= b.speed;
    b.y = B_Y - WHEEL_R; b.angle = 0; b.face = -1;
    if (b.x <= LANE_LEFT) { b.x = TUBE_L; game.phase = "tubeBC"; }
  }
  // Left tube B->ramp lane.
  else if (game.phase === "tubeBC") {
    setEngine(b.speed);
    b.face = 1; b.angle = Math.PI / 2; b.x = TUBE_L;
    b.y += Math.max(4, b.speed);
    if (b.y >= GY - WHEEL_R) { b.y = GY - WHEEL_R; b.angle = 0; game.phase = "run"; sndJump(); }
  }
  else if (game.phase === "run") {
    setEngine(b.speed);
    b.face = 1; b.x += b.speed;
    b.y = rampProfile(b.x) - WHEEL_R;
    b.angle = (b.x > RAMP_X0 && b.x < LIP_X) ? -TH : (b.x >= LIP_X ? -TH : 0);
    if (b.x >= LIP_X) {
      b.vx = Math.cos(TH) * b.speed; b.vy = -Math.sin(TH) * b.speed;
      b.angle = -TH; game.phase = "air"; stopEngine();
    }
  }
  else if (game.phase === "air") {
    const prevX = b.x;
    if (keys["ArrowLeft"])  b.angle -= ROT;   // rotate nose up (rear down)
    if (keys["ArrowRight"]) b.angle += ROT;   // rotate nose down (front down)
    b.x += b.vx; b.y += b.vy; b.vy += G;
    const low = b.y + Math.abs(AX * Math.sin(b.angle)) + WHEEL_R;   // lowest wheel
    const topY = GY - LAND_RISE;              // height of the ramp's top edge / front face

    if (b.x >= BUS_X0 && b.x <= game.busEnd && low >= BUS_TOP) { crash(); return; }  // into a bus
    if (b.x < game.landStart && low >= GY) { crash(); return; }                      // fell short of the ramp

    if (b.x >= game.landStart) {
      // The ramp has a VERTICAL FRONT FACE. Coming in below the top edge = you
      // smack the face = crash. Only clearing the top edge lets you reach the slope.
      if (prevX < game.landStart && low > topY) { crash(); return; }
      if (b.x <= game.landEnd) {
        // Valid landing zone is the top slope, from the top edge down to the flat.
        const surf = topY + (b.x - game.landStart) / LAND_LEN * LAND_RISE;
        if (low >= surf) {
          const rel = b.angle - PHI;          // 0 = both wheels flat; <0 rear-first; >0 front-first
          if (rel <= FRONT_EPS && rel >= -LEANBACK) cleared(); else crash();
          return;
        }
      } else if (low >= GY) { crash(); return; }  // overshot past the ramp end
    }
    // Truly flew off the end — relative to the (possibly off-screen) ramp, NOT the
    // fixed screen width, so a long bus row doesn't put an invisible wall mid-air.
    if (b.x > game.landEnd + 80) crash();
  }
}

// =====================================================================
//  DRAW
// =====================================================================
function roundRectPath(x, y, w, h, r) {
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.arcTo(x + w, y, x + w, y + h, r);
  ctx.arcTo(x + w, y + h, x, y + h, r);
  ctx.arcTo(x, y + h, x, y, r);
  ctx.arcTo(x, y, x + w, y, r);
  ctx.closePath();
}
function drawBus(bx) {
  const bw = BUS_W - 5;
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5;
  roundRectPath(bx, BUS_TOP, bw, BUS_H - 5, 6); ctx.stroke();
  roundRectPath(bx + 3, BUS_TOP + 4, bw - 6, 9, 2); ctx.stroke();
  ctx.beginPath(); ctx.moveTo(bx + bw * 0.5, BUS_TOP + 4); ctx.lineTo(bx + bw * 0.5, BUS_TOP + 13); ctx.stroke();
  ctx.beginPath(); ctx.arc(bx + 6, GY - 4, 3, 0, Math.PI * 2);
  ctx.moveTo(bx + bw - 3, GY - 4); ctx.arc(bx + bw - 6, GY - 4, 3, 0, Math.PI * 2); ctx.stroke();
}
function drawBike(x, y, angle, face) {
  ctx.save();
  ctx.translate(x, y); ctx.scale(face, 1); ctx.rotate(angle * face);
  ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
  ctx.beginPath(); ctx.arc(-AX, 0, WHEEL_R, 0, Math.PI * 2); ctx.stroke();   // rear
  ctx.beginPath(); ctx.arc(AX, 0, WHEEL_R, 0, Math.PI * 2); ctx.stroke();    // front
  ctx.beginPath();
  ctx.moveTo(-AX, 0); ctx.lineTo(0, -7); ctx.lineTo(AX, 0);
  ctx.moveTo(0, -7); ctx.lineTo(6, -12); ctx.stroke();
  ctx.strokeStyle = "#0ff";
  ctx.beginPath();
  ctx.moveTo(-2, -7); ctx.lineTo(-4, -18); ctx.lineTo(8, -14);
  ctx.moveTo(-4, -18); ctx.arc(-4, -21, 3, 0, Math.PI * 2);
  ctx.stroke();
  ctx.restore();
}
function centerText(t, size, y, color = "#fff") {
  ctx.fillStyle = color; ctx.font = size + "px 'Courier New', monospace";
  ctx.textAlign = "center"; ctx.fillText(t, W / 2, y);
}
function drawBoard(top) {
  ctx.fillStyle = "#888"; ctx.font = "13px 'Courier New', monospace"; ctx.textAlign = "center";
  ctx.fillText("TOP 5 SCORES", W / 2, top);
  ctx.font = "16px 'Courier New', monospace";
  for (let i = 0; i < 5; i++) {
    const e = game.scores[i], y = top + 24 + i * 21;
    ctx.fillStyle = e ? "#fff" : "#555";
    ctx.textAlign = "left";  ctx.fillText((i + 1) + ".  " + (e ? e.initials : "---"), W / 2 - 65, y);
    ctx.textAlign = "right"; ctx.fillText("" + (e ? e.score : 0), W / 2 + 65, y);
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  if (game.state === "playing" || game.state === "paused") {
    // Fit-to-screen: once the landing ramp would run past the right edge, scale
    // the whole scene down (anchored at the ground line) so it stays visible.
    // Physics stays in world coordinates — only the drawing is zoomed.
    const vs = Math.min(1, (W - 12) / (game.landEnd + 12));
    ctx.save();
    ctx.translate(0, GY); ctx.scale(vs, vs); ctx.translate(0, -GY);

    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
    // Lane A (top run-up, L->R) + right tube down to lane B
    ctx.beginPath(); ctx.moveTo(LANE_LEFT, A_Y); ctx.lineTo(TUBE_R + 14, A_Y); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(TUBE_R - 14, A_Y); ctx.lineTo(TUBE_R - 14, B_Y);
    ctx.moveTo(TUBE_R + 14, A_Y); ctx.lineTo(TUBE_R + 14, B_Y);
    ctx.stroke();
    // Lane B (middle run-up, R->L) + left tube down to the ramp lane
    ctx.beginPath(); ctx.moveTo(TUBE_L - 14, B_Y); ctx.lineTo(LANE_RIGHT, B_Y); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(TUBE_L - 14, B_Y); ctx.lineTo(TUBE_L - 14, GY);
    ctx.moveTo(TUBE_L + 14, B_Y); ctx.lineTo(TUBE_L + 14, GY);
    ctx.stroke();
    // Ramp lane: runway + takeoff ramp (with a vertical launch face)
    ctx.beginPath();
    ctx.moveTo(TUBE_L + 14, GY); ctx.lineTo(RAMP_X0, GY); ctx.lineTo(LIP_X, LIP_Y); ctx.lineTo(LIP_X, GY);
    ctx.stroke();

    for (let i = 0; i < game.numBuses; i++) drawBus(BUS_X0 + i * BUS_W);

    // Landing ramp: a solid wedge — vertical FRONT FACE (facing the buses), then
    // the sloped top (the only valid landing surface), then flat ground.
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(game.landStart, GY);                 // base of the front face
    ctx.lineTo(game.landStart, GY - LAND_RISE);     // up the vertical front face
    ctx.lineTo(game.landEnd, GY);                   // down the top slope
    ctx.lineTo(W / vs, GY);                          // flat ground out to the screen edge
    ctx.stroke();

    for (const p of game.debris) {
      ctx.globalAlpha = Math.max(0, p.life / p.maxLife);
      ctx.fillStyle = "#fa0"; ctx.fillRect(p.x - 1.5, p.y - 1.5, 3, 3);
    }
    ctx.globalAlpha = 1;

    if (game.phase !== "done") drawBike(game.bike.x, game.bike.y, game.bike.angle, game.bike.face);
    ctx.restore();   // back to screen space for the HUD / overlays

    ctx.fillStyle = "#fff"; ctx.font = "20px 'Courier New', monospace"; ctx.textAlign = "left";
    ctx.fillText("SCORE " + game.score, 20, 30);
    ctx.fillText("LIVES " + game.lives, 20, 55);
    ctx.textAlign = "right";
    ctx.fillText("BUSES " + game.numBuses, W - 20, 30);
    ctx.fillText("HI " + (game.scores[0] ? game.scores[0].score : 0), W - 20, 55);

    // Speed meter (during the run-up, before the jump)
    if (game.phase !== "air" && game.phase !== "done") {
      ctx.strokeStyle = "#0ff"; ctx.lineWidth = 2; ctx.strokeRect(20, H - 40, 220, 18);
      ctx.fillStyle = "#0ff"; ctx.fillRect(22, H - 38, 216 * (game.bike.speed - MIN_S) / (MAX_S - MIN_S), 14);
      ctx.font = "13px 'Courier New', monospace"; ctx.textAlign = "left";
      ctx.fillText("SPEED", 20, H - 48);
    }
    if (game.clearTimer > 0) centerText("CLEARED!", 36, 120, "#0ff");
    if (game.crashTimer > 0) centerText("CRASH!", 36, 120, "#f44");
  }

  // (menu is the HTML #menu overlay — nothing drawn on the canvas for it)
  if (game.state === "over") {
    // Opaque: fill black so the run-up lanes don't show through, then a dialog frame.
    ctx.fillStyle = "#000"; ctx.fillRect(0, 0, W, H);
    ctx.strokeStyle = "#0ff"; ctx.lineWidth = 2;
    roundRectPath(W / 2 - 210, 78, 420, 362, 12); ctx.stroke();
    centerText("GAME OVER", 44, 122, "#f44");
    centerText("SCORE " + game.score, 20, 156);
    drawBoard(190);   // PLAY AGAIN / MENU / ARCADE buttons are an HTML overlay over the box
  }
}

// --- Touch ---
function bindButton(id, code) {
  const el = document.getElementById(id);
  const down = e => { e.preventDefault(); initAudio();
    if (game.state === "menu" || game.state === "over") { startGame(); return; }
    keys[code] = true; };
  const up = e => { e.preventDefault(); keys[code] = false; };
  el.addEventListener("touchstart", down, { passive: false });
  el.addEventListener("touchend", up, { passive: false });
  el.addEventListener("mousedown", down); el.addEventListener("mouseup", up); el.addEventListener("mouseleave", up);
}
bindButton("btnUp", "ArrowUp"); bindButton("btnDown", "ArrowDown");
bindButton("btnLeft", "ArrowLeft"); bindButton("btnRight", "ArrowRight");
canvas.addEventListener("touchstart", e => { e.preventDefault(); initAudio();
  if ((game.state === "menu" || game.state === "over") && lbEntry.style.display === "none") startGame();
}, { passive: false });
if ("ontouchstart" in window || navigator.maxTouchPoints > 0) document.getElementById("touch").style.display = "flex";

renderMenuBoard();   // show local scores right away
fetchBoard();        // pull the shared leaderboard (re-renders the menu board)
function loop() { update(); draw(); requestAnimationFrame(loop); }
loop();
</script>
</body>
</html>
